
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: #0f1117; color: #e8eaf2; min-height: 100vh; padding: 24px 16px 48px; }
.date { font-size: 13px; color: #6b7291; margin-bottom: 4px; }
.greeting { font-size: 24px; font-weight: 600; margin-bottom: 22px; }
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.stat { background: #181c28; border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.stat-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.stat-val { font-size: 17px; font-weight: 600; }
.stat-lbl { font-size: 11px; color: #6b7291; margin-top: 2px; }
.sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.sec-lbl { font-size: 11px; color: #6b7291; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.sec-count { font-size: 11px; color: #6b7291; }
.add-inline-btn { background: none; border: 1px solid #2a3050; border-radius: 8px; color: #6b7291; font-size: 12px; padding: 4px 10px; cursor: pointer; }
.add-inline-btn:hover { color: #e8eaf2; border-color: #3a4060; }
.items { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.item { background: #181c28; border-radius: 14px; padding: 13px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.item:active { background: #1e2335; }
.check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #2e3450; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.18s; }
.r-check { border-radius: 6px; }
.item.done .check { background: #3ecf8e; border-color: #3ecf8e; }
.item.done .r-check { background: #f5a623; border-color: #f5a623; }
.checkmark { display: none; font-size: 12px; font-weight: 800; color: #001f10; }
.r-check .checkmark { color: #1a0e00; }
.item.done .checkmark { display: block; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.item-text { font-size: 15px; flex: 1; line-height: 1.3; }
.item.done .item-text { text-decoration: line-through; color: #4a5070; }
.del { background: none; border: none; color: #4a5070; font-size: 20px; cursor: pointer; padding: 0 4px; }
.add-form { background: #181c28; border-radius: 14px; padding: 12px 14px; margin-bottom: 20px; display: none; flex-direction: column; gap: 10px; }
.add-form.open { display: flex; }
.add-inp { background: #0f1117; border: 1.5px solid #2a3050; border-radius: 10px; padding: 10px 12px; color: #e8eaf2; font-size: 15px; font-family: inherit; outline: none; }
.add-inp:focus { border-color: #3a4a80; }
.add-inp::placeholder { color: #4a5070; }
.add-row2 { display: flex; gap: 8px; }
.cat-sel { background: #0f1117; border: 1.5px solid #2a3050; border-radius: 10px; padding: 8px 10px; color: #e8eaf2; font-size: 14px; font-family: inherit; outline: none; flex: 1; }
.btn-save { background: #f5a623; border: none; border-radius: 10px; padding: 8px 16px; color: #1a0e00; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-cancel { background: none; border: 1px solid #2a3050; border-radius: 10px; padding: 8px 12px; color: #6b7291; font-size: 14px; cursor: pointer; }
.progress { background: #181c28; border-radius: 16px; padding: 16px; margin-bottom: 10px; }
.prog-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; }
.prog-track { height: 6px; background: #252a40; border-radius: 3px; overflow: hidden; }
.prog-fill { height: 6px; border-radius: 3px; transition: width 0.4s; }
.divider { height: 1px; background: #1e2335; margin: 4px 0 20px; }
.sync-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #2e3450; flex-shrink: 0; transition: background 0.3s; }
.sync-dot.ok { background: #3ecf8e; }
.sync-dot.busy { background: #f5a623; }
.sync-dot.err { background: #e85d5d; }
.sync-txt { font-size: 12px; color: #6b7291; flex: 1; }

/* Settings panel */
.settings-btn { background: none; border: none; color: #6b7291; font-size: 20px; cursor: pointer; padding: 2px 6px; float: right; margin-top: -2px; }
.panel { background: #181c28; border-radius: 16px; padding: 16px; margin-top: 16px; display: none; flex-direction: column; gap: 10px; }
.panel.open { display: flex; }
.panel-title { font-size: 13px; font-weight: 600; color: #6b7291; letter-spacing: 0.5px; margin-bottom: 2px; }
.panel-btn { background: #1e2335; border: 1px solid #2a3050; border-radius: 10px; padding: 11px 14px; color: #e8eaf2; font-size: 14px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 10px; }
.panel-btn:hover { border-color: #3a4060; }
.panel-btn .icon { font-size: 16px; }
.panel-btn .lbl { flex: 1; }
.panel-btn .sub { font-size: 12px; color: #6b7291; }
.import-area { background: #0f1117; border: 1.5px solid #2a3050; border-radius: 10px; padding: 10px 12px; color: #e8eaf2; font-size: 13px; font-family: inherit; outline: none; resize: none; height: 80px; }
.import-area:focus { border-color: #3a4a80; }
.backup-list { display: flex; flex-direction: column; gap: 6px; }
.backup-item { background: #0f1117; border: 1px solid #2a3050; border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
.backup-item:hover { border-color: #3ecf8e; }
.backup-time { font-size: 13px; color: #e8eaf2; flex: 1; }
.backup-meta { font-size: 11px; color: #6b7291; }
.restore-btn { background: none; border: 1px solid #2a3050; border-radius: 8px; color: #3ecf8e; font-size: 12px; padding: 4px 10px; cursor: pointer; }
.empty { color: #4a5070; font-size: 14px; text-align: center; padding: 16px 0; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #3ecf8e; color: #001f10; font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div style="display:flex;align-items:flex-start;justify-content:space-between">
  <div>
    <div class="date" id="date"></div>
    <div class="greeting" id="greet"></div>
  </div>
  <button class="settings-btn" onclick="togglePanel()" title="Einstellungen">⚙️</button>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-icon" style="background:#2a1f08">🔥</div>
    <div>
      <div class="stat-val" style="color:#f5a623" id="streak-val">0 Tage</div>
      <div class="stat-lbl">Streak</div>
    </div>
  </div>
  <div class="stat">
    <div class="stat-icon" style="background:#0a2018">✅</div>
    <div>
      <div class="stat-val" style="color:#3ecf8e" id="pct-val">0%</div>
      <div class="stat-lbl">Heute erledigt</div>
    </div>
  </div>
</div>

<!-- Routinen -->
<div class="sec-header">
  <span class="sec-lbl">🔄 Routinen</span>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="sec-count" id="r-count"></span>
    <button class="add-inline-btn" onclick="openForm('routine')">+ Hinzufügen</button>
  </div>
</div>
<div class="items" id="routine-list"></div>
<div class="add-form" id="routine-form">
  <input class="add-inp" id="r-inp" placeholder="z.B. Meditation, Sport, Journaling…" onkeydown="if(event.key==='Enter')saveItem('routine')">
  <div class="add-row2">
    <button class="btn-cancel" onclick="closeForm('routine')">Abbrechen</button>
    <button class="btn-save" onclick="saveItem('routine')" style="flex:1">Routine speichern</button>
  </div>
</div>

<div class="divider"></div>

<!-- Todos -->
<div class="sec-header">
  <span class="sec-lbl">📋 Aufgaben heute</span>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="sec-count" id="t-count"></span>
    <button class="add-inline-btn" onclick="openForm('todo')">+ Hinzufügen</button>
  </div>
</div>
<div class="items" id="todo-list"></div>
<div class="add-form" id="todo-form">
  <input class="add-inp" id="t-inp" placeholder="Aufgabe für heute…" onkeydown="if(event.key==='Enter')saveItem('todo')">
  <div class="add-row2">
    <select class="cat-sel" id="t-cat">
      <option value="Arbeit">💼 Arbeit</option>
      <option value="Privat">⭐ Privat</option>
      <option value="Sonstiges">📌 Sonstiges</option>
    </select>
    <button class="btn-cancel" onclick="closeForm('todo')">✕</button>
    <button class="btn-save" onclick="saveItem('todo')">Speichern</button>
  </div>
</div>

<div class="divider"></div>

<div class="progress">
  <div class="prog-row">
    <span style="color:#6b7291">Routinen</span>
    <span style="color:#f5a623;font-weight:600" id="r-pct">0%</span>
  </div>
  <div class="prog-track"><div class="prog-fill" id="r-prog" style="width:0%;background:#f5a623"></div></div>
</div>
<div class="progress">
  <div class="prog-row">
    <span style="color:#6b7291">Aufgaben</span>
    <span style="color:#3ecf8e;font-weight:600" id="t-pct">0%</span>
  </div>
  <div class="prog-track"><div class="prog-fill" id="t-prog" style="width:0%;background:#3ecf8e"></div></div>
</div>

<div class="sync-row">
  <div class="sync-dot" id="sdot"></div>
  <span class="sync-txt" id="stxt">Lädt…</span>
</div>

<!-- Settings Panel -->
<div class="panel" id="panel">
  <div class="panel-title">BACKUP & DATEN</div>

  <button class="panel-btn" onclick="exportData()">
    <span class="icon">📤</span>
    <span class="lbl">Exportieren<br><span class="sub">Kopiert deine Daten – für Handywechsel</span></span>
  </button>

  <div>
    <button class="panel-btn" onclick="toggleImport()" style="margin-bottom:8px">
      <span class="icon">📥</span>
      <span class="lbl">Importieren<br><span class="sub">Daten von altem Gerät einfügen</span></span>
    </button>
    <div id="import-area-wrap" style="display:none">
      <textarea class="import-area" id="import-txt" placeholder="Exportierten Text hier einfügen…"></textarea>
      <div class="add-row2" style="margin-top:8px">
        <button class="btn-cancel" onclick="toggleImport()">Abbrechen</button>
        <button class="btn-save" onclick="importData()" style="flex:1">Importieren</button>
      </div>
    </div>
  </div>

  <div class="panel-title" style="margin-top:6px">AUTOMATISCHE BACKUPS</div>
  <div class="backup-list" id="backup-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const CAT_COLOR = { Arbeit:'#5b8af5', Privat:'#3ecf8e', Sonstiges:'#8b7cf5' };
const MAX_BACKUPS = 5;
let routines=[], todos=[], streak=0;

function todayKey(){ return new Date().toISOString().slice(0,10); }
function fmt(){ return new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'}); }
function greet(){ const h=new Date().getHours(); return h<12?'Guten Morgen 👋':h<17?'Guten Nachmittag 👋':'Guten Abend 👋'; }
function setSyncStatus(s,t){ document.getElementById('sdot').className='sync-dot '+(s||''); document.getElementById('stxt').textContent=t; }

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

// ---- STORAGE ----
async function load(){
  try {
    const rr=await window.storage.get('v3_routines');
    const tr=await window.storage.get('v3_todos');
    const sr=await window.storage.get('v3_streak');
    const dr=await window.storage.get('v3_lastDate');
    const rd=await window.storage.get('v3_routineDate');

    routines = rr ? JSON.parse(rr.value) : [];
    todos    = tr ? JSON.parse(tr.value) : [];
    streak   = sr ? parseInt(sr.value) : 0;
    const lastDate=dr?dr.value:'', routineDate=rd?rd.value:'';
    const today=todayKey();
    const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);

    if(lastDate!==today){
      streak = lastDate===yesterday ? streak+1 : 1;
      await window.storage.set('v3_streak',String(streak));
      await window.storage.set('v3_lastDate',today);
    }
    if(routineDate!==today){
      routines=routines.map(r=>({...r,done:false}));
      await window.storage.set('v3_routineDate',today);
      await window.storage.set('v3_routines',JSON.stringify(routines));
    }

    setSyncStatus('ok','Daten geladen ✓');
    await makeBackup('Beim Öffnen');
  } catch(e){ setSyncStatus('','Bereit'); }
  render(); renderBackups();
}

async function persist(){
  setSyncStatus('busy','Speichert…');
  try {
    await window.storage.set('v3_routines',JSON.stringify(routines));
    await window.storage.set('v3_todos',JSON.stringify(todos));
    setSyncStatus('ok','Gespeichert ✓');
  } catch { setSyncStatus('err','Fehler'); }
}

// ---- BACKUP ----
async function makeBackup(trigger){
  try {
    const br=await window.storage.get('v3_backups');
    let backups=br?JSON.parse(br.value):[];
    const snap={
      ts: Date.now(),
      trigger,
      routines: JSON.parse(JSON.stringify(routines)),
      todos: JSON.parse(JSON.stringify(todos)),
      streak
    };
    backups.unshift(snap);
    if(backups.length>MAX_BACKUPS) backups=backups.slice(0,MAX_BACKUPS);
    await window.storage.set('v3_backups',JSON.stringify(backups));
  } catch {}
}

async function renderBackups(){
  try {
    const br=await window.storage.get('v3_backups');
    const backups=br?JSON.parse(br.value):[];
    const el=document.getElementById('backup-list');
    if(!backups.length){ el.innerHTML='<div class="empty" style="padding:10px 0">Noch keine Backups</div>'; return; }
    el.innerHTML=backups.map((b,i)=>{
      const d=new Date(b.ts);
      const timeStr=d.toLocaleDateString('de-DE',{day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
      return `<div class="backup-item">
        <div style="flex:1">
          <div class="backup-time">${timeStr} <span style="font-size:11px;color:#6b7291">(${b.trigger})</span></div>
          <div class="backup-meta">${b.routines.length} Routinen · ${b.todos.length} Aufgaben</div>
        </div>
        <button class="restore-btn" onclick="restoreBackup(${i})">Wiederherstellen</button>
      </div>`;
    }).join('');
  } catch { document.getElementById('backup-list').innerHTML='<div class="empty">Keine Backups gefunden</div>'; }
}

async function restoreBackup(i){
  try {
    const br=await window.storage.get('v3_backups');
    const backups=br?JSON.parse(br.value):[];
    const b=backups[i];
    if(!b) return;
    routines=b.routines; todos=b.todos; streak=b.streak;
    await persist();
    render();
    showToast('✓ Wiederhergestellt');
  } catch { showToast('Fehler beim Wiederherstellen'); }
}

// ---- EXPORT / IMPORT ----
async function exportData(){
  const payload={ routines, todos, streak, exportedAt: new Date().toISOString() };
  const str=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  try { await navigator.clipboard.writeText(str); showToast('✓ In Zwischenablage kopiert!'); }
  catch { prompt('Diesen Text kopieren:', str); }
}

function toggleImport(){ const w=document.getElementById('import-area-wrap'); w.style.display=w.style.display==='none'?'block':'none'; }

async function importData(){
  const raw=document.getElementById('import-txt').value.trim();
  if(!raw){ showToast('Kein Text eingefügt'); return; }
  try {
    const payload=JSON.parse(decodeURIComponent(escape(atob(raw))));
    if(!payload.routines||!payload.todos) throw new Error();
    routines=payload.routines; todos=payload.todos; streak=payload.streak||0;
    await persist();
    await window.storage.set('v3_streak',String(streak));
    render(); toggleImport();
    showToast('✓ Daten importiert!');
  } catch { showToast('Ungültiger Export-Code'); }
}

// ---- UI ----
function togglePanel(){ document.getElementById('panel').classList.toggle('open'); renderBackups(); }

function openForm(type){ document.getElementById(type+'-form').classList.add('open'); document.getElementById(type==='routine'?'r-inp':'t-inp').focus(); }
function closeForm(type){ document.getElementById(type+'-form').classList.remove('open'); document.getElementById(type==='routine'?'r-inp':'t-inp').value=''; }

function saveItem(type){
  if(type==='routine'){
    const text=document.getElementById('r-inp').value.trim(); if(!text) return;
    routines.push({id:Date.now(),text,done:false});
    closeForm('routine');
  } else {
    const text=document.getElementById('t-inp').value.trim(); if(!text) return;
    todos.push({id:Date.now(),text,cat:document.getElementById('t-cat').value,done:false});
    closeForm('todo');
  }
  persist(); render();
}

function toggle(type,id){ const l=type==='routine'?routines:todos; const i=l.find(x=>x.id===id); if(i){i.done=!i.done;persist();render();} }
function del(type,id,e){ e.stopPropagation(); if(type==='routine')routines=routines.filter(x=>x.id!==id); else todos=todos.filter(x=>x.id!==id); persist();render(); }

function render(){
  const rDone=routines.filter(r=>r.done).length, tDone=todos.filter(t=>t.done).length;
  const rPct=routines.length?Math.round(rDone/routines.length*100):0;
  const tPct=todos.length?Math.round(tDone/todos.length*100):0;
  const allPct=(routines.length+todos.length)?Math.round((rDone+tDone)/(routines.length+todos.length)*100):0;

  document.getElementById('streak-val').textContent=streak+' Tage';
  document.getElementById('pct-val').textContent=allPct+'%';
  document.getElementById('r-pct').textContent=rPct+'%';
  document.getElementById('t-pct').textContent=tPct+'%';
  document.getElementById('r-prog').style.width=rPct+'%';
  document.getElementById('t-prog').style.width=tPct+'%';
  document.getElementById('r-count').textContent=rDone+'/'+routines.length;
  document.getElementById('t-count').textContent=tDone+'/'+todos.length;

  const rl=document.getElementById('routine-list');
  rl.innerHTML=routines.length?routines.map(r=>`
    <div class="item${r.done?' done':''}" onclick="toggle('routine',${r.id})">
      <div class="check r-check"><span class="checkmark">✓</span></div>
      <span style="font-size:15px">🔄</span>
      <span class="item-text">${r.text.replace(/</g,'&lt;')}</span>
      <button class="del" onclick="del('routine',${r.id},event)">×</button>
    </div>`).join(''):'<div class="empty">Noch keine Routinen – füge deine erste hinzu ↑</div>';

  const tl=document.getElementById('todo-list');
  tl.innerHTML=todos.length?todos.map(t=>`
    <div class="item${t.done?' done':''}" onclick="toggle('todo',${t.id})">
      <div class="check"><span class="checkmark">✓</span></div>
      <div class="dot" style="background:${CAT_COLOR[t.cat]||'#6b7291'}"></div>
      <span class="item-text">${t.text.replace(/</g,'&lt;')}</span>
      <button class="del" onclick="del('todo',${t.id},event)">×</button>
    </div>`).join(''):'<div class="empty">Keine Aufgaben heute – füge eine hinzu ↑</div>';
}

// Auto-backup beim Verlassen
window.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden') makeBackup('Beim Verlassen'); });

document.getElementById('date').textContent=fmt();
document.getElementById('greet').textContent=greet();
load();
</script>
</body>
</html>
